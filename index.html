<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Craft - QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #06b6d4;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            animation: float 25s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Grid Pattern */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            text-align: center;
            padding: 2rem 0 3rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            flex: 1;
            align-items: start;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title i {
            color: var(--primary-light);
        }

        /* Input Section */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 0.875rem 1rem;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        textarea:focus, input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Color Picker */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        input[type="color"] {
            width: 48px;
            height: 48px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: none;
            cursor: pointer;
            padding: 2px;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: none;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* QR Preview */
        .qr-preview {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .qr-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
            position: relative;
        }

        .qr-container:hover {
            transform: scale(1.02);
        }

        #qrcode {
            display: flex;
            justify-content: center;
        }

        #qrcode img {
            display: block;
            max-width: 100%;
        }

        .qr-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .qr-placeholder i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Download Options */
        .download-section {
            margin-top: 1.5rem;
            width: 100%;
        }

        .download-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-align: center;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
        }

        .toast-icon.success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .toast-icon.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        /* Preset Buttons */
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .preset-btn {
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            border-color: var(--primary);
            color: var(--primary-light);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scan Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scan 2s linear infinite;
            opacity: 0;
        }

        .qr-container:hover .scan-line {
            opacity: 1;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* History Section */
        .history-section {
            margin-top: 2rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: var(--surface-light);
        }

        .history-thumb {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .history-thumb img {
            max-width: 100%;
            max-height: 100%;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-text {
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-pattern"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-qrcode"></i>
                </div>
                <span class="logo-text">QR Craft</span>
            </div>
            <p class="tagline">Generate beautiful QR codes in seconds</p>
        </header>

        <div class="main-content">
            <!-- Input Card -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-pen-to-square"></i>
                    Content
                </h2>

                <div class="input-group">
                    <label class="input-label">Enter text, URL, or any data</label>
                    <div class="input-wrapper">
                        <textarea id="qrText" placeholder="https://example.com or any text..." maxlength="2000"></textarea>
                    </div>
                    <div class="char-count"><span id="charCount">0</span> / 2000 characters</div>
                </div>

                <h2 class="card-title" style="margin-top: 2rem;">
                    <i class="fas fa-sliders"></i>
                    Customization
                </h2>

                <div class="options-grid">
                    <div class="input-group">
                        <label class="input-label">Size (px)</label>
                        <input type="number" id="qrSize" value="256" min="100" max="1000" step="50">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Error Correction</label>
                        <select id="qrLevel">
                            <option value="1">Low (L)</option>
                            <option value="0">Medium (M)</option>
                            <option value="3" selected>Quartile (Q)</option>
                            <option value="2">High (H)</option>
                        </select>
                    </div>
                </div>

                <div class="options-grid" style="margin-top: 1rem;">
                    <div class="input-group">
                        <label class="input-label">Foreground Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qrColor" value="#000000">
                            <span class="color-value" id="colorValue">#000000</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Background Color</label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="qrBgColor" value="#ffffff">
                            <span class="color-value" id="bgColorValue">#ffffff</span>
                        </div>
                    </div>
                </div>

                <div class="preset-grid">
                    <button class="preset-btn" onclick="applyPreset('url')">🔗 URL</button>
                    <button class="preset-btn" onclick="applyPreset('email')">✉️ Email</button>
                    <button class="preset-btn" onclick="applyPreset('wifi')">📶 WiFi</button>
                    <button class="preset-btn" onclick="applyPreset('phone')">📞 Phone</button>
                    <button class="preset-btn" onclick="applyPreset('sms')">💬 SMS</button>
                    <button class="preset-btn" onclick="applyPreset('vcard')">👤 vCard</button>
                </div>

                <div class="btn-group" style="margin-top: 2rem;">
                    <button class="btn btn-primary" id="generateBtn" onclick="generateQR()">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        Generate QR Code
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        <i class="fas fa-trash"></i>
                        Clear
                    </button>
                </div>
            </div>

            <!-- Preview Card -->
            <div class="card">
                <h2 class="card-title">
                    <i class="fas fa-eye"></i>
                    Preview
                </h2>

                <div class="qr-preview" id="previewArea">
                    <div class="qr-placeholder">
                        <i class="fas fa-qrcode"></i>
                        <p>Your QR code will appear here</p>
                    </div>
                </div>

                <div class="download-section" id="downloadSection" style="display: none;">
                    <p class="download-title">Download as</p>
                    <div class="btn-group" style="justify-content: center;">
                        <button class="btn btn-secondary" onclick="downloadQR('png')">
                            <i class="fas fa-image"></i>
                            PNG
                        </button>
                        <button class="btn btn-secondary" onclick="downloadQR('svg')">
                            <i class="fas fa-vector-square"></i>
                            SVG
                        </button>
                        <button class="btn btn-secondary" onclick="copyQR()">
                            <i class="fas fa-copy"></i>
                            Copy
                        </button>
                    </div>
                </div>

                <div class="history-section" id="historySection" style="display: none;">
                    <h3 class="card-title" style="font-size: 1rem;">
                        <i class="fas fa-clock-rotate-left"></i>
                        Recent
                    </h3>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>QR Craft - Free QR Code Generator</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">
            <i class="fas fa-check"></i>
        </div>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script>
        let qrCode = null;
        let qrHistory = JSON.parse(localStorage.getItem('qrHistory') || '[]');

        // Update character count
        document.getElementById('qrText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });

        // Update color values
        document.getElementById('qrColor').addEventListener('input', function() {
            document.getElementById('colorValue').textContent = this.value;
        });

        document.getElementById('qrBgColor').addEventListener('input', function() {
            document.getElementById('bgColorValue').textContent = this.value;
        });

        // Generate QR Code
        function generateQR() {
            const text = document.getElementById('qrText').value.trim();
            if (!text) {
                showToast('Please enter some text first!', 'error');
                return;
            }

            const size = parseInt(document.getElementById('qrSize').value) || 256;
            const level = parseInt(document.getElementById('qrLevel').value);
            const color = document.getElementById('qrColor').value;
            const bgColor = document.getElementById('qrBgColor').value;

            const previewArea = document.getElementById('previewArea');
            previewArea.innerHTML = '<div class="qr-container" id="qrContainer"><div class="scan-line"></div><div id="qrcode"></div></div>';

            // Clear previous
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';

            qrCode = new QRCode(qrcodeDiv, {
                text: text,
                width: size,
                height: size,
                colorDark: color,
                colorLight: bgColor,
                correctLevel: level
            });

            document.getElementById('downloadSection').style.display = 'block';

            // Add to history
            addToHistory(text, size, color, bgColor, level);
        }

        // Add to history
        function addToHistory(text, size, color, bgColor, level) {
            const historyItem = {
                text: text,
                size: size,
                color: color,
                bgColor: bgColor,
                level: level,
                time: new Date().toISOString()
            };

            qrHistory.unshift(historyItem);
            if (qrHistory.length > 5) qrHistory = qrHistory.slice(0, 5);
            localStorage.setItem('qrHistory', JSON.stringify(qrHistory));
            renderHistory();
        }

        // Render history
        function renderHistory() {
            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');

            if (qrHistory.length === 0) {
                historySection.style.display = 'none';
                return;
            }

            historySection.style.display = 'block';
            historyList.innerHTML = qrHistory.map((item, index) => {
                const time = new Date(item.time).toLocaleTimeString();
                return `
                    <div class="history-item" onclick="loadHistory(${index})">
                        <div class="history-info">
                            <div class="history-text">${escapeHtml(item.text.substring(0, 50))}${item.text.length > 50 ? '...' : ''}</div>
                            <div class="history-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Load from history
        function loadHistory(index) {
            const item = qrHistory[index];
            document.getElementById('qrText').value = item.text;
            document.getElementById('qrSize').value = item.size;
            document.getElementById('qrColor').value = item.color;
            document.getElementById('colorValue').textContent = item.color;
            document.getElementById('qrBgColor').value = item.bgColor;
            document.getElementById('bgColorValue').textContent = item.bgColor;
            document.getElementById('qrLevel').value = item.level;
            document.getElementById('charCount').textContent = item.text.length;
            generateQR();
        }

        // Download QR Code
        function downloadQR(format) {
            const container = document.getElementById('qrContainer');
            if (!container) return;

            const img = container.querySelector('img');
            if (!img) return;

            if (format === 'png') {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth || 256;
                canvas.height = img.naturalHeight || 256;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('Downloaded as PNG!');
            } else if (format === 'svg') {
                // For SVG, we'll create a simple SVG version
                const size = parseInt(document.getElementById('qrSize').value) || 256;
                const text = document.getElementById('qrText').value;
                const color = document.getElementById('qrColor').value;

                // Create a simple SVG placeholder (QRCode.js doesn't output SVG directly)
                const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
                    <rect width="100%" height="100%" fill="${document.getElementById('qrBgColor').value}"/>
                    <image href="${img.src}" width="${size}" height="${size}"/>
                </svg>`;

                const blob = new Blob([svgContent], { type: 'image/svg+xml' });
                const link = document.createElement('a');
                link.download = 'qrcode.svg';
                link.href = URL.createObjectURL(blob);
                link.click();
                showToast('Downloaded as SVG!');
            }
        }

        // Copy QR to clipboard
        function copyQR() {
            const container = document.getElementById('qrContainer');
            if (!container) return;

            const img = container.querySelector('img');
            if (!img) return;

            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth || 256;
            canvas.height = img.naturalHeight || 256;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            canvas.toBlob(function(blob) {
                const item = new ClipboardItem({ 'image/png': blob });
                navigator.clipboard.write([item]).then(() => {
                    showToast('Copied to clipboard!');
                }).catch(() => {
                    showToast('Failed to copy', 'error');
                });
            });
        }

        // Presets
        function applyPreset(type) {
            const textInput = document.getElementById('qrText');
            switch(type) {
                case 'url':
                    textInput.value = 'https://';
                    break;
                case 'email':
                    textInput.value = 'mailto:someone@example.com?subject=Hello&body=Message';
                    break;
                case 'wifi':
                    textInput.value = 'WIFI:S:MyNetwork;T:WPA;P:password;;';
                    break;
                case 'phone':
                    textInput.value = 'tel:+1234567890';
                    break;
                case 'sms':
                    textInput.value = 'sms:+1234567890?body=Hello';
                    break;
                case 'vcard':
                    textInput.value = 'BEGIN:VCARD\nVERSION:3.0\nFN:John Doe\nTEL:+1234567890\nEMAIL:john@example.com\nEND:VCARD';
                    break;
            }
            textInput.focus();
            document.getElementById('charCount').textContent = textInput.value.length;
        }

        // Clear all
        function clearAll() {
            document.getElementById('qrText').value = '';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('previewArea').innerHTML = `
                <div class="qr-placeholder">
                    <i class="fas fa-qrcode"></i>
                    <p>Your QR code will appear here</p>
                </div>
            `;
            document.getElementById('downloadSection').style.display = 'none';
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;
            toastIcon.className = 'toast-icon ' + type;
            toastIcon.innerHTML = type === 'success' ? '<i class="fas fa-check"></i>' : '<i class="fas fa-exclamation"></i>';

            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        renderHistory();

        // Generate on Enter (Ctrl+Enter)
        document.getElementById('qrText').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                generateQR();
            }
        });
    </script>
</body>
</html>
